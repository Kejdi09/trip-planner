name: CI - Web

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'web/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'web/**'

jobs:
  build:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Test
        working-directory: web
        run: npm test

      - name: Build
        working-directory: web
        run: npm run build
